name: Daily Morning Dashboard Update

on:
  schedule:
    # 毎朝7:00 JST = 22:00 UTC（前日）
    - cron: '0 22 * * *'
  # 手動実行も可能
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run generate script
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_API_TOKEN_2: ${{ secrets.CHATWORK_API_TOKEN_2 }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CHATWORK_MY_ACCOUNT_ID: ${{ secrets.CHATWORK_MY_ACCOUNT_ID }}
        run: python scripts/generate.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: daily update $(date +'%Y-%m-%d %H:%M JST' -d '+9 hours')"
          git push
